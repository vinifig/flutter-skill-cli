<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="40" height="40" rx="8" fill="#1a1a2e"/>

  <!-- Main wing/arrow shape -->
  <path d="M 10 8 L 30 20 L 10 32 L 10 23 L 20 20 L 10 17 Z"
        fill="url(#grad1)" opacity="0.95"/>

  <!-- Secondary layer -->
  <path d="M 14 12 L 26 20 L 14 28 L 14 23 L 20 20 L 14 17 Z"
        fill="url(#grad2)" opacity="0.6"/>

  <!-- Tech nodes -->
  <circle cx="10" cy="8" r="2" fill="#00D4FF"/>
  <circle cx="10" cy="32" r="2" fill="#6C63FF"/>
  <circle cx="30" cy="20" r="2.5" fill="#00D4FF"/>

  <!-- Circuit lines -->
  <line x1="10" y1="8" x2="5" y2="8" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
  <line x1="5" y1="8" x2="5" y2="32" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
  <line x1="5" y1="32" x2="10" y2="32" stroke="#6C63FF" stroke-width="1" opacity="0.6"/>

  <!-- Small dots -->
  <circle cx="5" cy="16" r="1" fill="#00D4FF" opacity="0.8"/>
  <circle cx="5" cy="24" r="1" fill="#6C63FF" opacity="0.8"/>

  <!-- Signal waves -->
  <path d="M 32 17 Q 35 20 32 23" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <path d="M 34 15 Q 38 20 34 25" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
</svg>
