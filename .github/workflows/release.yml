name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.3.0

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  # Extract version from tag
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  # Publish to pub.dev
  publish-pub-dev:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          TAG_VERSION=${{ needs.prepare.outputs.version }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: pubspec.yaml version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to pub.dev
        run: dart pub publish --force
        env:
          PUB_DEV_CREDENTIALS: ${{ secrets.PUB_DEV_CREDENTIALS }}

  # Publish to npm
  publish-npm:
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ needs.prepare.outputs.version }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish VSCode extension
  publish-vscode:
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ needs.prepare.outputs.version }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build and publish
        run: vsce publish -p ${{ secrets.VSCE_PAT }}

  # Publish IntelliJ plugin
  publish-intellij:
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intellij-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION=${{ needs.prepare.outputs.version }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: build.gradle.kts version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}

  # Update Homebrew tap
  update-homebrew:
    needs: [prepare, publish-pub-dev]  # Wait for pub.dev to ensure release is valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate SHA256
        id: sha256
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          URL="https://github.com/ai-dashboad/flutter-skill/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ai-dashboad/homebrew-flutter-skill
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          SHA256=${{ steps.sha256.outputs.sha256 }}

          # Update the formula file
          sed -i "s|url \".*\"|url \"https://github.com/ai-dashboad/flutter-skill/archive/refs/tags/v${VERSION}.tar.gz\"|" homebrew-tap/flutter-skill.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew-tap/flutter-skill.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flutter-skill.rb
          git commit -m "Update flutter-skill to v${{ needs.prepare.outputs.version }}" || echo "No changes to commit"
          git push

  # Create GitHub Release
  create-release:
    needs: [prepare, publish-pub-dev, publish-npm, publish-vscode, publish-intellij, update-homebrew]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download IntelliJ plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: intellij-plugin
          path: ./artifacts
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
